services:
  - type: web
    name: ufc-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_LIFETIME
        value: 30d
      - key: COOKIE_SECURE
        value: true
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: DEMO_ADMIN_EMAIL
        value: demo-admin@example.com
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASSWORD
        sync: false
